# .github/workflows/ci-cd.yml
# CI/CD Pipeline - GitHub Actions

name: CI/CD Pipeline

# Triggerlar: qachon pipeline ishga tushadi?
on:
  push:
    branches:
      - main        # main branchga push bo'lganda
      - develop     # develop branchga push bo'lganda
  pull_request:
    branches:
      - main        # main'ga PR ochilganda
  workflow_dispatch:  # Qo'lda ishga tushirish imkoniyati

# Global muhit o'zgaruvchilari
env:
  NODE_ENV: test
  APP_VERSION: ${{ github.sha }}

# Joblar ta'rifi
jobs:
  # =============================================
  # JOB 1: Build va Test
  # =============================================
  build-and-test:
    name: Build & Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    # Matrix strategy: bir vaqtda bir nechta versiyada test
    strategy:
      matrix:
        node-version: [18.x, 20.x]
      fail-fast: false  # Biri muvaffaqiyatsiz bo'lsa ham davom etsin

    steps:
      # 1-qadam: Kodni yuklab olish
      - name: Kodni checkout qilish
        uses: actions/checkout@v4

      # 2-qadam: Node.js sozlash
      - name: Node.js ${{ matrix.node-version }} ni sozlash
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'  # npm cache saqlash (tezlashtirish)
      # 3-qadam: Dependensiyalarni o'rnatish
      - name: Dependensiyalarni o'rnatish
        run: npm ci  # 'npm install' o'rniga 'npm ci' CI uchun xavfsizroq

      # 4-qadam: Lint tekshirish (opsional)
      - name: Kod sifatini tekshirish (Lint)
        run: npm run lint
        continue-on-error: true  # Lint xatosi pipelineni to'xtatmasin

      # 5-qadam: Testlarni ishga tushirish
      - name: Testlarni ishga tushirish va coverage hisoblash
        run: npm test
        env:
          NODE_ENV: test

      # 6-qadam: Test natijalarini yuklash
      - name: Coverage hisobotini artifact sifatida saqlash
        uses: actions/upload-artifact@v4
        if: always()  # Test muvaffaqiyatsiz bo'lsa ham saqlash
        with:
          name: coverage-report-node${{ matrix.node-version }}
          path: coverage/
          retention-days: 7

  # =============================================
  # JOB 2: Security Scan
  # =============================================
  security-scan:
    name: Xavfsizlik tekshiruvi
    runs-on: ubuntu-latest
    needs: build-and-test  # build-and-test tugagandan keyin ishga tushadi

    steps:
      - uses: actions/checkout@v4

      - name: Node.js ni sozlash
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Dependensiyalarni o'rnatish
        run: npm ci

      - name: NPM audit (zaifliklarni tekshirish)
        run: npm audit --audit-level=high
        continue-on-error: true

  # =============================================
  # JOB 3: Deploy (faqat main branch'da)
  # =============================================
  deploy-staging:
    name: Staging'ga Deploy
    runs-on: ubuntu-latest
    needs: [build-and-test, security-scan]
    # MUHIM: Faqat main branchga push bo'lganda deploy qilish
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: staging
      url: https://staging.example.com

    steps:
      - uses: actions/checkout@v4

      - name: Deployment informatsiyasini ko'rsatish
        run: |
          echo '============================================'
          echo 'STAGING DEPLOYMENT BOSHLANMOQDA'
          echo '============================================'
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Muallif: ${{ github.actor }}"
          echo "Vaqt: $(date)"
          echo '============================================'
      - name: Staging simulyatsiyasi
        run: |
          echo 'Ilovani packaging qilmoqda...'
          tar -czf app-${{ github.sha }}.tar.gz src/ package.json
          echo 'Serverga yuklash simulyatsiyasi...'
          sleep 2
          echo 'Health check o\'tkazilmoqda...'
          sleep 1
          echo 'DEPLOYMENT MUVAFFAQIYATLI YAKUNLANDI!'

      - name: Deployment artifact'ini saqlash
        uses: actions/upload-artifact@v4
        with:
          name: deployment-package
          path: app-${{ github.sha }}.tar.gz
          retention-days: 30
